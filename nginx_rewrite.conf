# ---- GeoHub 地理聚合页 ----
rewrite ^/geohub/province/(.+?)/?$ /geohub.php?type=province&name=$1 last;
rewrite ^/geohub/city/(.+?)/?$ /geohub.php?type=city&name=$1 last;



# 标签列表
rewrite ^/tags/?$ /tags.php last;

# 标签详情
rewrite ^/tag/([^/]+)/?$ /tag.php?slug=$1 last;
