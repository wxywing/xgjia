# ---- 静态页面 (about, contact, ad, help, faq, agreement, privacy) ----
rewrite ^/pages/([a-z]+)/?$ /pages.php?page=$1 last;

# ---- SEO 静态文件直接返回（不被 rewrite 拦截）----
# sitemap.xml 和 robots.txt 由 nginx 直接提供
# 如果放在 public root 下，无需额外配置
# 如需动态生成，取消下方注释：
#rewrite ^/sitemap\.xml$ /sitemap.php last;

# ---- 404 自定义错误页 ----
# 取消注释以启用自定义 404 页面
error_page 404 /404.php;
