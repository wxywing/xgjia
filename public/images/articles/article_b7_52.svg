<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A1223"/>
      <stop offset="100%" style="stop-color:#1A5FA8"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>

  <!-- 肺部图标 -->
  <g transform="translate(550, 150)">
    <ellipse cx="0" cy="0" rx="90" ry="70" fill="#C9A84C" opacity="0.15"/>
    <path d="M-40,-40 Q-60,0 -40,40 M40,-40 Q60,0 40,40" stroke="#C9A84C" stroke-width="4" fill="none" opacity="0.6"/>
    <path d="M0,-50 L0,50 M-30,-30 L-30,30 M30,-30 L30,30" stroke="#C9A84C" stroke-width="3" fill="none" opacity="0.4"/>
    <circle cx="-40" cy="-30" r="8" fill="#C9A84C" opacity="0.5"/>
    <circle cx="40" cy="-30" r="8" fill="#C9A84C" opacity="0.5"/>
    <circle cx="-40" cy="30" r="8" fill="#C9A84C" opacity="0.5"/>
    <circle cx="40" cy="30" r="8" fill="#C9A84C" opacity="0.5"/>
  </g>

  <!-- 标题 -->
  <text x="60" y="160" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="42" font-weight="bold" fill="#FFFFFF">呼吸道问题</text>
  <text x="60" y="220" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="28" fill="#C9A84C">全解析</text>

  <!-- 关键词标签 -->
  <rect x="60" y="280" width="140" height="36" rx="18" fill="#C9A84C" opacity="0.3"/>
