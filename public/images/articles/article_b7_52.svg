  <rect x="220" y="280" width="140" height="36" rx="18" fill="#C9A84C" opacity="0.3"/>
  <text x="290" y="305" font-family="PingFang SC, sans-serif" font-size="16" fill="#FFFFFF" text-anchor="middle">用药选择</text>

  <rect x="380" y="280" width="140" height="36" rx="18" fill="#C9A84C" opacity="0.3"/>
  <text x="450" y="305" font-family="PingFang SC, sans-serif" font-size="16" fill="#FFFFFF" text-anchor="middle">预防要点</text>

  <!-- 底栏 -->
  <rect x="0" y="450" width="800" height="50" fill="#000000" opacity="0.3"/>
  <text x="60" y="482" font-family="PingFang SC, sans-serif" font-size="18" fill="#C9A84C">信鸽之家</text>
  <text x="740" y="482" font-family="PingFang SC, sans-serif" font-size="16" fill="#999999" text-anchor="end">xgjia.com</text>
