<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A1223"/>
      <stop offset="100%" style="stop-color:#1A5FA8"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  
  <!-- 鸽子剪影（起飞姿态） -->
  <g transform="translate(550, 180)">
    <ellipse cx="0" cy="0" rx="80" ry="30" fill="#C9A84C" opacity="0.2"/>
    <path d="M-60,-20 Q-30,-60 0,-30 Q30,-60 60,-20 Q40,0 0,-10 Q-40,0 -60,-20" fill="#C9A84C" opacity="0.8"/>
    <circle cx="-45" cy="-25" r="12" fill="#C9A84C" opacity="0.6"/>
    <path d="M-10,-35 Q20,-50 50,-30" stroke="#C9A84C" stroke-width="3" fill="none" opacity="0.4"/>
  </g>
  
  <!-- 标题 -->
  <text x="60" y="180" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="42" font-weight="bold" fill="#FFFFFF">幼鸽开家</text>
  <text x="60" y="240" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="28" fill="#C9A84C">最全攻略</text>
  
  <!-- 关键词标签 -->
  <rect x="60" y="300" width="120" height="36" rx="18" fill="#C9A84C" opacity="0.3"/>
  <text x="120" y="325" font-family="PingFang SC, sans-serif" font-size="16" fill="#FFFFFF" text-anchor="middle">时机选择</text>
  
  <rect x="200" y="300" width="120" height="36" rx="18" fill="#C9A84C" opacity="0.3"/>
  <text x="260" y="325" font-family="PingFang SC, sans-serif" font-size="16" fill="#FFFFFF" text-anchor="middle">操作步骤</text>
  
  <rect x="340" y="300" width="120" height="36" rx="18" fill="#C9A84C" opacity="0.3"/>
  <text x="400" y="325" font-family="PingFang SC, sans-serif" font-size="16" fill="#FFFFFF" text-anchor="middle">防丢技巧</text>
  
  <!-- 底栏 -->
  <rect x="0" y="450" width="800" height="50" fill="#000000" opacity="0.3"/>
  <text x="60" y="482" font-family="PingFang SC, sans-serif" font-size="18" fill="#C9A84C">信鸽之家</text>
  <text x="740" y="482" font-family="PingFang SC, sans-serif" font-size="16" fill="#999999" text-anchor="end">xgjia.com</text>
</svg>