<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a237e"/>
      <stop offset="100%" style="stop-color:#283593"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c9a84c"/>
      <stop offset="100%" style="stop-color:#e8c860"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <!-- 装饰圆 -->
  <circle cx="680" cy="80" r="120" fill="rgba(201,168,76,0.08)"/>
  <circle cx="100" cy="420" r="80" fill="rgba(255,255,255,0.05)"/>
  <!-- 顶部装饰线 -->
  <rect x="0" y="0" width="800" height="4" fill="url(#accent)"/>
  <!-- 主标题 -->
  <text x="50" y="130" font-family="Arial, sans-serif" font-size="38" font-weight="bold" fill="#ffffff">2026年春棚</text>
  <text x="50" y="180" font-family="Arial, sans-serif" font-size="38" font-weight="bold" fill="#ffffff">冠军鸽 TOP100</text>
  <!-- 数据装饰 -->
  <rect x="50" y="210" width="300" height="3" fill="#c9a84c"/>
  <text x="50" y="250" font-family="Arial, sans-serif" font-size="18" fill="rgba(255,255,255,0.85)">基于 1270万+ 条赛事数据</text>
  <text x="50" y="280" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.6)">全国 19 省 | 100 羽冠军鸽</text>
  <!-- 数据标签 -->
  <rect x="50" y="320" width="160" height="80" rx="8" fill="rgba(201,168,76,0.15)" stroke="#c9a84c" stroke-width="1"/>
  <text x="130" y="352" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#c9a84c" text-anchor="middle">1881.2</text>
  <text x="130" y="378" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.6)" text-anchor="middle">500km级最快分速</text>
  <rect x="240" y="320" width="160" height="80" rx="8" fill="rgba(201,168,76,0.15)" stroke="#c9a84c" stroke-width="1"/>
  <text x="320" y="352" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#c9a84c" text-anchor="middle">1504.2</text>
  <text x="320" y="378" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.6)" text-anchor="middle">TOP100平均分速</text>
  <rect x="430" y="320" width="160" height="80" rx="8" fill="rgba(201,168,76,0.15)" stroke="#c9a84c" stroke-width="1"/>
  <text x="510" y="352" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#c9a84c" text-anchor="middle">352km</text>
  <text x="510" y="378" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.6)" text-anchor="middle">平均飞行距离</text>
  <!-- 信鸽之家标识 -->
  <text x="50" y="460" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.4)">信鸽之家 · 数据为本</text>
</svg>
