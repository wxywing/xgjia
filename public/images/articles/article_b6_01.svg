<path d="M140,90 Q150,70 170,65 Q185,62 195,70 Q200,75 195,80 Q190,85 185,82 Q180,78 175,80 Q160,88 140,90 Z" fill="none" stroke="#c9a84c" stroke-width="2.5" opacity="0.9"/>
