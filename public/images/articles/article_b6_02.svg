<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
<defs>
<linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" style="stop-color:#0d2137"/>
<stop offset="50%" style="stop-color:#1a3a5f"/>
<stop offset="100%" style="stop-color:#2c5364"/>
</linearGradient>
<linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
<stop offset="0%" style="stop-color:#c9a84c"/>
<stop offset="100%" style="stop-color:#ffe680"/>
</linearGradient>
</defs>
<rect width="800" height="500" fill="url(#bg)" rx="16"/>
<!-- Magnifying glass -->
<circle cx="280" cy="200" r="65" fill="none" stroke="#c9a84c" stroke-width="4" opacity="0.8"/>
<line x1="330" y1="250" x2="380" y2="300" stroke="#c9a84c" stroke-width="5" stroke-linecap="round" opacity="0.8"/>
<!-- Ring number in center -->
<text x="280" y="210" text-anchor="middle" font-family="Courier New,monospace" font-size="24" font-weight="700" fill="#ffe680" opacity="0.9">2026 ♀ 123456</text>
<!-- Foot ring icon -->
<ellipse cx="560" cy="170" rx="40" ry="55" fill="none" stroke="#c9a84c" stroke-width="3.5" opacity="0.7"/>
<ellipse cx="560" cy="170" rx="30" ry="42" fill="none" stroke="#c9a84c" stroke-width="2" opacity="0.5"/>
<line x1="530" y1="130" x2="590" y2="130" stroke="#c9a84c" stroke-width="3" opacity="0.6"/>
<line x1="530" y1="210" x2="590" y2="210" stroke="#c9a84c" stroke-width="3" opacity="0.6"/>
<!-- Data bars -->
<rect x="470" y="280" width="80" height="12" rx="4" fill="#c9a84c" opacity="0.3"/>
<rect x="470" y="300" width="120" height="12" rx="4" fill="#c9a84c" opacity="0.5"/>
<rect x="470" y="320" width="60" height="12" rx="4" fill="#c9a84c" opacity="0.3"/>
<rect x="470" y="340" width="100" height="12" rx="4" fill="#c9a84c" opacity="0.4"/>
<!-- Trophy -->
<path d="M600,90 L620,90 L625,130 L595,130 Z" fill="none" stroke="#c9a84c" stroke-width="2.5" opacity="0.6"/>
<circle cx="610" cy="80" r="15" fill="none" stroke="#c9a84c" stroke-width="2" opacity="0.6"/>
<line x1="595" y1="130" x2="625" y2="130" stroke="#c9a84c" stroke-width="2.5" opacity="0.6"/>
<!-- Steps -->
<text x="200" y="360" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#c9a84c" opacity="0.7">① 看距离天气</text>
<text x="200" y="390" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#c9a84c" opacity="0.7">② 查赛绩链</text>
<text x="200" y="420" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#c9a84c" opacity="0.7">③ 比鸽主数据</text>
<!-- Title -->
<text x="400" y="460" text-anchor="middle" font-family="system-ui,sans-serif" font-size="30" font-weight="700" fill="#fff">公棚成绩单怎么看</text>
<text x="400" y="485" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#c9a84c">足环号三步查询 · 赛绩全分析</text>
</svg>
